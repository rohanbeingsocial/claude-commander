# Cross-platform compile + test gate: proves the Rust core and frontend build on
# Windows, macOS and Linux on every push. (Release artifacts are built by release.yml.)
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri 2)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Frontend typecheck + build
        run: |
          npm ci
          npm run build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
